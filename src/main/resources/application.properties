spring.application.name=finance-hq
server.port=${PORT:8080}
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# Datasource — Railway injects prod values; defaults are for local Postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_hq}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=5

# JPA — Flyway owns DDL; Hibernate must not touch schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Flyway — explicit config required for Supabase Session Pooler
spring.flyway.enabled=true
spring.flyway.schemas=public
spring.flyway.locations=classpath:db/migration
# Supabase public schema has built-in objects; baseline at 0 so V1 still runs
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token.expiry=3600
jwt.refresh-token.expiry=2592000

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Mail — Gmail SMTP; Railway injects prod values; empty defaults prevent startup failure locally
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.task.scheduling.pool.size=2

# Sentry — error and warning monitoring
sentry.dsn=${SENTRY_DSN:}
sentry.minimum-event-level=WARN
sentry.environment=${SENTRY_ENVIRONMENT:production}
sentry.release=${SENTRY_RELEASE:unknown}
sentry.traces-sample-rate=0.0
