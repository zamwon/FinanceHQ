spring.application.name=finance-hq
server.port=${PORT:8080}
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Datasource — Railway injects prod values; defaults are for local Postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_hq}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=5

# JPA — Flyway owns DDL; Hibernate must not touch schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Flyway — explicit config required for Supabase Session Pooler
spring.flyway.enabled=true
spring.flyway.schemas=public
spring.flyway.locations=classpath:db/migration
# Supabase public schema has built-in objects; baseline at 0 so V1 still runs
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token.expiry=3600
jwt.refresh-token.expiry=2592000

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Resend — HTTP email API (bypasses Railway SMTP block)
resend.api-key=${RESEND_API_KEY:}
resend.from-address=${RESEND_FROM_ADDRESS:onboarding@resend.dev}
spring.task.scheduling.pool.size=2

# Twelve Data — stock/ETF price API (US markets and global; free tier excludes GPW)
twelvedata.api.key=${TWELVEDATA_API_KEY:demo}
twelvedata.base.url=https://api.twelvedata.com

# Yahoo Finance — GPW/Warsaw stocks (no key required; /XWAR-suffixed tickers route here)
yahoo.finance.base.url=https://query1.finance.yahoo.com

# Portfolio price refresh throttle (minutes)
portfolio.price.stale-minutes=15

# Sentry — error and warning monitoring
sentry.dsn=${SENTRY_DSN:}
sentry.minimum-event-level=WARN
sentry.environment=${SENTRY_ENVIRONMENT:production}
sentry.release=${SENTRY_RELEASE:unknown}
sentry.traces-sample-rate=0.0
