@if (toastSvc.toast()) {
  <div class="fixed top-4 right-4 z-50 pointer-events-none bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-lg px-4 py-3 shadow-lg flex items-center gap-2 text-sm text-zinc-800 dark:text-zinc-200">
    @if (toastSvc.toast()!.isError) {
      <span class="text-red-500 font-bold">✕</span>
    } @else {
      <span class="text-green-600 dark:text-green-400 font-bold">✓</span>
    }
    {{ toastSvc.toast()!.text }}
  </div>
}
