<!-- Login UI stub — full spartan/ui rebuild in Tasks 8-14 -->
<div class="page-container">
  <div class="auth-card">
    <header>
      <h1>Sign in</h1>
      <p>Access your FinanceHQ account</p>
    </header>

    @if (errorMessage) {
      <div role="alert">{{ errorMessage }}</div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
      <div>
        <label for="email">Email address</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" />
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password" autocomplete="current-password" />
        <button type="button" (click)="showPassword = !showPassword">
          {{ showPassword ? 'Hide' : 'Show' }}
        </button>
      </div>

      <button type="submit" [disabled]="loginForm.invalid || loading">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <p>Need an account? <a routerLink="/register">Register</a></p>
  </div>
</div>
