<!-- Register UI stub — full spartan/ui rebuild in Tasks 8-14 -->
<div class="page-container">
  <div class="auth-card">
    <header>
      <h1>Create account</h1>
      <p>Start tracking your financial obligations</p>
    </header>

    @if (errorMessage) {
      <div role="alert">{{ errorMessage }}</div>
    }

    <form [formGroup]="registerForm" (ngSubmit)="submit()" novalidate>
      <div>
        <label for="email">Email address</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" />
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password" autocomplete="new-password" [title]="passwordTooltip" />
        <button type="button" (click)="showPassword = !showPassword">
          {{ showPassword ? 'Hide' : 'Show' }}
        </button>
      </div>

      <div>
        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" [type]="showConfirm ? 'text' : 'password'" formControlName="confirmPassword" autocomplete="new-password" />
        <button type="button" (click)="showConfirm = !showConfirm">
          {{ showConfirm ? 'Hide' : 'Show' }}
        </button>
        @if (registerForm.controls.confirmPassword.value && registerForm.hasError('passwordMismatch')) {
          <span>Passwords do not match</span>
        }
      </div>

      <button type="submit" [disabled]="registerForm.invalid || loading">
        {{ loading ? 'Creating account…' : 'Create account' }}
      </button>
    </form>

    <p>Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
